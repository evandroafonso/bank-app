<aside class="sidebar">
  <div class="sidebar-logo">
    <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="10" fill="#4F46E5" />
      <path
        d="M10 18L16 24L26 12"
        stroke="white"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
    <span>BankApp</span>
  </div>

  <nav class="sidebar-nav">
    <a
      class="nav-item"
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: false }"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="3" width="9" height="9" rx="1" stroke="currentColor" stroke-width="2" />
        <rect x="13" y="3" width="9" height="9" rx="1" stroke="currentColor" stroke-width="2" />
        <rect x="2" y="14" width="9" height="7" rx="1" stroke="currentColor" stroke-width="2" />
        <rect x="13" y="14" width="9" height="7" rx="1" stroke="currentColor" stroke-width="2" />
      </svg>
      Accounts
    </a>
  </nav>

  <div class="sidebar-footer">
    <ng-container *ngIf="user$ | async as user">
      <div class="user-info">
        <div class="user-avatar">{{ user.email?.charAt(0)?.toUpperCase() }}</div>
        <span class="user-email">{{ user.email }}</span>
      </div>
    </ng-container>

    <button class="btn-logout" (click)="onLogout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path
          d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <polyline
          points="16 17 21 12 16 7"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <line
          x1="21"
          y1="12"
          x2="9"
          y2="12"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
      Sign out
    </button>
  </div>
</aside>
